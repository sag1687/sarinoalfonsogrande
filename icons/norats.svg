  <!-- sagoma stilizzata di ratto -->
  <g fill="#f2f5f8">
    <ellipse cx="30" cy="38" rx="16" ry="9"/>
    <circle cx="45" cy="33" r="6.5"/>
    <circle cx="49" cy="27" r="3"/>
    <path d="M14 38 Q4 42 8 50" stroke="#f2f5f8" stroke-width="2.5" fill="none"/>
  </g>
  <circle cx="47" cy="32" r="1.3" fill="#1b2430"/>
  <!-- barra di divieto nel blu accento della famiglia -->
  <line x1="10" y1="10" x2="54" y2="54" stroke="#5b9bd5" stroke-width="6" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#5b9bd5" stroke-width="5"/>
</svg>
