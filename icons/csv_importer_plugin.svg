<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Sfondo arrotondato -->
  <rect width="256" height="256" rx="60" fill="#2E7D32"/>
  <!-- Foglio CSV stilizzato -->
  <path d="M70 50 h80 l40 40 v110 a10 10 0 0 1 -10 10 h-110 a10 10 0 0 1 -10 -10 v-140 a10 10 0 0 1 10 -10 z" fill="#ffffff" opacity="0.9"/>
  <!-- Piega del foglio -->
  <path d="M150 50 v40 h40 z" fill="#e0e0e0"/>
  <!-- Linee di testo (CSV) -->
  <rect x="90" y="110" width="80" height="8" rx="4" fill="#a0a0a0"/>
  <rect x="90" y="130" width="80" height="8" rx="4" fill="#a0a0a0"/>
  <rect x="90" y="150" width="60" height="8" rx="4" fill="#a0a0a0"/>
  <!-- Testo "CSV" -->
  <text x="130" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#2E7D32" text-anchor="middle">CSV</text>
  <!-- Pin mappa (Marker vettoriale 3D) -->
  <path d="M180 140 c-25 0 -25 35 0 80 c25 -45 25 -80 0 -80 z" fill="#F44336" stroke="#ffffff" stroke-width="4"/>
  <circle cx="180" cy="165" r="10" fill="#ffffff"/>
</svg>