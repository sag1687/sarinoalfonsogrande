<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle (muted slate-blue palette) -->
  <circle cx="32" cy="32" r="30" fill="#141a22" stroke="#5b9bd5" stroke-width="2"/>
  <!-- Ground line -->
  <line x1="10" y1="44" x2="54" y2="44" stroke="#2c3a48" stroke-width="2"/>
  <!-- Displaced ground (dashed, before) -->
  <path d="M 10 44 Q 32 38 54 44" fill="none" stroke="#2c3a48" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Displaced ground (after) -->
  <path d="M 10 44 Q 32 30 54 44" fill="none" stroke="#5b9bd5" stroke-width="2"/>
  <!-- Vertical displacement arrow -->
  <line x1="32" y1="38" x2="32" y2="26" stroke="#f2f5f8" stroke-width="2"/>
  <path d="M 28 30 L 32 24 L 36 30" fill="none" stroke="#f2f5f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- East-West displacement arrow -->
  <line x1="18" y1="50" x2="30" y2="50" stroke="#c3ccd6" stroke-width="2"/>
  <path d="M 27 47 L 31 50 L 27 53" fill="none" stroke="#c3ccd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Satellite -->
  <rect x="44" y="8" width="9" height="6" rx="1.5" fill="#f59e0b"/>
  <rect x="38" y="9.5" width="5" height="3" rx="1" fill="#fbbf24"/>
  <rect x="53" y="9.5" width="5" height="3" rx="1" fill="#fbbf24"/>
  <!-- Radar beams -->
  <path d="M 46 14 L 32 32" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M 50 14 L 40 34" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2"/>
</svg>
